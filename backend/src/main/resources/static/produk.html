<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Produk</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

    <h1>Data Produk</h1>

    <div class="form-box">

        <input type="text" id="kode_barang" placeholder="Kode Barang">

        <input type="text" id="nama_produk" placeholder="Nama Produk">

        <input type="number" id="harga_jual" placeholder="Harga Jual">

        <input type="number" id="stok" placeholder="Stok">

        <button onclick="tambahProduk()">Tambah Produk</button>

    </div>

    <table>

        <thead>
            <tr>
                <th>ID</th>
                <th>Kode</th>
                <th>Nama</th>
                <th>Harga</th>
                <th>Stok</th>
                <th>Aksi</th>
            </tr>
        </thead>

        <tbody id="produkTable"></tbody>

    </table>

</div>

<script src="js/app.js"></script>
</body>
</html>
